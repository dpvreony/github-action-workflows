name: 'Common .NET Build Steps'
description: 'Shared setup, build, test, and pack steps for .NET projects'
inputs:
  solutionName:
    description: 'Name of the solution file WITHOUT the extension'
    required: true
  useSlnx:
    description: 'If true, uses .slnx solution format instead of .sln'
    required: false
    default: 'false'
  isPrimaryBuildOs:
    description: 'If true, this OS will upload release artifacts'
    required: true
  produceNugetPackages:
    description: 'If true, NuGet packages will be produced, SBOM generated, and VirusTotal scanned'
    required: false
    default: 'false'
  runIntTests:
    description: 'If true, integration tests will be run'
    required: false
    default: 'true'
  osName:
    description: 'OS name for artifact naming (e.g., linux, windows, macos)'
    required: true
  sonarToken:
    description: 'Sonar token for scanning'
    required: false
  sonarProjectKey:
    description: 'Sonar project key'
    required: false
  sonarOrganisationKey:
    description: 'Sonar organisation key'
    required: false
  githubToken:
    description: 'GitHub token for Sonar'
    required: false
  virusTotalApiKey:
    description: 'VirusTotal API key'
    required: false
  workloads:
    description: 'Comma-separated list of .NET workloads to install'
    required: false
    default: ''
  apiDocumentation:
    description: 'API Documentation generation tool. Set to "DocFx" to enable DocFX metadata generation, or any other value to disable it.'
    required: false
    default: 'DocFx'
  syncFusionLicense:
    description: 'License key to apply to Syncfusion components'
    required: false
    default: ''
outputs:
  nbgvVersion:
    description: 'NBGV SemVer2 version'
    value: ${{ steps.nbgv.outputs.SemVer2 }}
  changeCommitLog:
    description: 'Changelog commit log'
    value: ${{ steps.changelog.outputs.commitLog }}
runs:
  using: 'composite'
  steps:
    - name: Setup Java 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
      with:
        global-json-file: "a/global.json"
    
    - name: Install DotNet workloads
      uses: ./github-action-workflows/.github/actions/dotnet-install-workloads
      with:
        workloads: ${{ inputs.workloads }}
    
    - name: Cleanup nuget local storage
      shell: pwsh
      run: |
        dotnet nuget locals all --clear
      working-directory: a/src
    
    - name: NBGV
      id: nbgv
      uses: dotnet/nbgv@master
      with:
        setAllVars: true
        path: a
    
    - name: Install dotnet tools
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        
        $jsonPath = "../github-action-workflows/.config/dotnet-tools.json"
        
        # Validate JSON file exists
        if (-not (Test-Path $jsonPath)) {
          Write-Error "dotnet-tools.json not found at: $jsonPath"
          exit 1
        }
        
        # Parse JSON with error handling
        try {
          $json = Get-Content $jsonPath -Raw | ConvertFrom-Json
        }
        catch {
          Write-Error "Failed to parse dotnet-tools.json: $_"
          exit 1
        }
        
        foreach ($toolName in $json.tools.PSObject.Properties.Name) {
          $tool = $json.tools.$toolName
          $version = $tool.version
          Write-Output "Installing $toolName version $version globally..."
          dotnet tool install --global $toolName --version $version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to install $toolName"
            exit $LASTEXITCODE
          }
        }
        
        Write-Output "All tools installed successfully"
      working-directory: a

    - name: Changelog
      uses: glennawatson/ChangeLog@0464dd89b26f61fecf24b41d675f8ffdb11c4c3f # v1
      id: changelog
      with:
        path: a
    
    - name: Prepare Artifact Directory
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path artifacts/nupkg | Out-Null
        New-Item -ItemType Directory -Force -Path artifacts/outdated | Out-Null
        New-Item -ItemType Directory -Force -Path artifacts/sbom | Out-Null
        New-Item -ItemType Directory -Force -Path artifacts/binlog | Out-Null
        New-Item -ItemType Directory -Force -Path artifacts/docfx | Out-Null
    
    - name: Restore Packages
      shell: pwsh
      working-directory: a/src
      run: |
        $useSlnx = $false
        if (-not [bool]::TryParse("$env:INPUTS_USESLNX", [ref]$useSlnx)) {
          $useSlnx = $false
        }
        $solutionExt = if ($useSlnx) { 'slnx' } else { 'sln' }
        dotnet restore "$env:INPUTS_SOLUTIONNAME.$solutionExt" /bl:${{ github.workspace }}/artifacts/binlog/restore.binlog
      env:
        INPUTS_USESLNX: ${{ inputs.useSlnx }}
        INPUTS_SOLUTIONNAME: ${{ inputs.solutionName }}
    
    - name: Report Changelog Summary
      shell: pwsh
      run: |
        $changecommitlog = @'
        $env:STEPS_CHANGELOG_OUTPUTS_COMMITLOG
        '@
        $changecommitlog = $changecommitlog.Replace('"', '''')
        $lines = $changecommitlog -split "`n"
        foreach ($line in $lines) {
          Write-Output "::notice::$line"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $line
        }
      env:
        STEPS_CHANGELOG_OUTPUTS_COMMITLOG: ${{ steps.changelog.outputs.commitLog }}
    
    - name: Run Sonar Scanner begin
      if: inputs.isPrimaryBuildOs == 'true' && inputs.sonarToken != '' && inputs.sonarProjectKey != '' && inputs.sonarOrganisationKey != ''
      shell: pwsh
      working-directory: a/src
      run: |
        sonarscanner begin /k:"$env:INPUTS_SONARPROJECTKEY" /d:sonar.login="$env:INPUTS_SONARTOKEN" /d:sonar.host.url="https://sonarcloud.io" /o:"$env:INPUTS_SONARORGANISATIONKEY" /d:sonar.cs.opencover.reportsPaths="${{ github.workspace }}/artifacts/unittestcoverage/coverage.xml"
      env:
        INPUTS_SONARPROJECTKEY: ${{ inputs.sonarProjectKey }}
        INPUTS_SONARTOKEN: ${{ inputs.sonarToken }}
        INPUTS_SONARORGANISATIONKEY: ${{ inputs.sonarOrganisationKey }}
    
    - name: Run Build
      id: run-build
      shell: pwsh
      working-directory: a/src
      run: |
        $env:CHANGE_COMMIT_LOG = @'
        $env:STEPS_CHANGELOG_OUTPUTS_COMMITLOG
        '@
        $useSlnx = $false
        if (-not [bool]::TryParse("$env:INPUTS_USESLNX", [ref]$useSlnx)) {
          $useSlnx = $false
        }
        $solutionExt = if ($useSlnx) { 'slnx' } else { 'sln' }
        dotnet build "$env:INPUTS_SOLUTIONNAME.$solutionExt" --configuration Release --no-restore /bl:${{ github.workspace }}/artifacts/binlog/build.binlog /p:ContinuousIntegrationBuild=true "/p:SyncfusionLicense={inputs.syncFusionLicense}"
      env:
        STEPS_CHANGELOG_OUTPUTS_COMMITLOG: ${{ steps.changelog.outputs.commitLog }}
        INPUTS_USESLNX: ${{ inputs.useSlnx }}
        INPUTS_SOLUTIONNAME: ${{ inputs.solutionName }}
    
    - name: Run Unit Tests
      shell: pwsh
      working-directory: a/src/${{ inputs.solutionName }}.UnitTests
      run: |
        $TimeoutMinutes = 10
        $TimeoutMs = $TimeoutMinutes * 60 * 1000

        $args = @(
          "run",
          "--no-build",
          "--configuration",
          "Release",
          "/bl:${{ github.workspace }}/artifacts/binlog/unittest.binlog",
          "--no-ansi",
          "--output",
          "detailed",
          "--coverage",
          "--coverage-output-format",
          "cobertura",
          "--coverage-output",
          "coverage.xml",
          "--long-running",
          "10",
          "--results-directory",
          "${{ github.workspace }}/artifacts/unittestcoverage"
        )

        $p = Start-Process -FilePath "dotnet" -ArgumentList $args -NoNewWindow -PassThru

        if (-not $p.WaitForExit($TimeoutMs)) {
          try { $p.Kill($true) } catch { }
          throw "Timed out after $TimeoutMinutes minute(s) running: dotnet $($args -join ' ')"
        }

        exit $p.ExitCode
    
    - name: Run Sonar Scanner end
      if: inputs.isPrimaryBuildOs == 'true' && inputs.sonarToken != '' && inputs.sonarProjectKey != '' && inputs.sonarOrganisationKey != ''
      shell: pwsh
      working-directory: a/src
      run: |
        $env:GITHUB_TOKEN = "$env:INPUTS_GITHUBTOKEN"
        sonarscanner end /d:sonar.login="$env:INPUTS_SONARTOKEN"
      env:
        INPUTS_GITHUBTOKEN: ${{ inputs.githubToken }}
        INPUTS_SONARTOKEN: ${{ inputs.sonarToken }}
    
    - name: Run BinLogStats for Build
      if: always() && !cancelled() && (steps.run-build.outcome == 'success' || steps.run-build.outcome == 'failure')
      shell: pwsh
      working-directory: a
      run: |
        gripe-msbuildlogstats -bl "${{ github.workspace }}/artifacts/binlog/build.binlog"
    
    - name: Report Unit Test Coverage
      shell: pwsh
      run: |
        $opencoverxmlpath = Get-ChildItem 'artifacts/unittestcoverage/coverage.xml' -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($opencoverxmlpath) {
          $xml = [xml](Get-Content $opencoverxmlpath)
          $unitTestCoverage = $xml.CoverageSession.Summary.branchCoverage
          $coverageMessage = "Unit Test Coverage: $unitTestCoverage"
          Write-Output "::notice::$coverageMessage"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $coverageMessage
        }
    
    - name: Run Integration Tests
      if: inputs.runIntTests == 'true'
      shell: pwsh
      working-directory: a/src/${{ inputs.solutionName }}.IntegrationTests
      run: |
        $TimeoutMinutes = 10
        $TimeoutMs = $TimeoutMinutes * 60 * 1000

        $args = @(
          "run",
          "--no-build",
          "--configuration",
          "Release",
          "/bl:${{ github.workspace }}/artifacts/binlog/inttest.binlog",
          "--no-ansi",
          "--output",
          "detailed",
          "--coverage",
          "--coverage-output-format",
          "cobertura",
          "--coverage-output",
          "coverage.xml",
          "--long-running",
          "10",
          "--results-directory",
          "${{ github.workspace }}/artifacts/inttestcoverage"
        )

        $p = Start-Process -FilePath "dotnet" -ArgumentList $args -NoNewWindow -PassThru

        if (-not $p.WaitForExit($TimeoutMs)) {
          try { $p.Kill($true) } catch { }
          throw "Timed out after $TimeoutMinutes minute(s) running: dotnet $($args -join ' ')"
        }

        exit $p.ExitCode

    - name: Report Integration Test Coverage
      if: inputs.runIntTests == 'true'
      shell: pwsh
      run: |
        $opencoverxmlpath = Get-ChildItem 'artifacts/inttestcoverage/coverage.xml' -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($opencoverxmlpath) {
          $xml = [xml](Get-Content $opencoverxmlpath)
          $intTestCoverage = $xml.CoverageSession.Summary.branchCoverage
          $coverageMessage = "Integration Test Coverage: $intTestCoverage"
          Write-Output "::notice::$coverageMessage"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $coverageMessage
        }
    
    - name: Produce Nuget Packages
      if: inputs.isPrimaryBuildOs == 'true' && inputs.produceNugetPackages == 'true'
      shell: pwsh
      working-directory: a/src
      run: |
        $env:CHANGE_COMMIT_LOG = @'
        $env:STEPS_CHANGELOG_OUTPUTS_COMMITLOG
        '@
        $useSlnx = $false
        if (-not [bool]::TryParse("$env:INPUTS_USESLNX", [ref]$useSlnx)) {
          $useSlnx = $false
        }
        $solutionExt = if ($useSlnx) { 'slnx' } else { 'sln' }
        dotnet pack "$env:INPUTS_SOLUTIONNAME.$solutionExt" --configuration Release --no-build /bl:${{ github.workspace }}/artifacts/binlog/pack.binlog --nologo /p:PackageOutputPath=${{ github.workspace }}/artifacts/nuget /p:ContinuousIntegrationBuild=true
      env:
        STEPS_CHANGELOG_OUTPUTS_COMMITLOG: ${{ steps.changelog.outputs.commitLog }}
        INPUTS_USESLNX: ${{ inputs.useSlnx }}
        INPUTS_SOLUTIONNAME: ${{ inputs.solutionName }}
    
    - name: Generate SBOM
      if: inputs.isPrimaryBuildOs == 'true' && inputs.produceNugetPackages == 'true'
      shell: pwsh
      working-directory: a
      run: |
        sbom-tool generate -b ${{ github.workspace }}/artifacts/nuget -bc src -pn $env:INPUTS_SOLUTIONNAME -pv $env:STEPS_NBGV_OUTPUTS_SIMPLEVERSION -ps "DHGMS Solutions" -nsb https://sbom.dhgms.com -m ${{ github.workspace }}/artifacts/sbom
      env:
        INPUTS_SOLUTIONNAME: ${{ inputs.solutionName }}
        STEPS_NBGV_OUTPUTS_SIMPLEVERSION: ${{ steps.nbgv.outputs.SimpleVersion }}
    
    - name: List outdated packages
      if: inputs.isPrimaryBuildOs == 'true'
      shell: pwsh
      working-directory: a/src
      run: |
        dotnet-outdated -o ${{ github.workspace }}/artifacts/outdated/outdated.json
    
    - name: VirusTotal Monitor Scan
      if: inputs.isPrimaryBuildOs == 'true' && inputs.produceNugetPackages == 'true' && inputs.virusTotalApiKey != ''
      uses: crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2 # v5
      with:
        vt_api_key: ${{ inputs.virusTotalApiKey }}
        vt_monitor: true
        monitor_path: /ghaction-virustotal
        files: |
          ./artifacts/nuget/*.nupkg

    - name: Produce DocFX API metadata
      if: inputs.isPrimaryBuildOs == 'true' && inputs.apiDocumentation == 'DocFx'
      shell: pwsh
      working-directory: artifacts/docfx
      run: |
        docfx metadata "${{ github.workspace }}/github-action-workflows/eng/docfx/docfx.json" --logLevel verbose

    - name: store binlogs
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binlogs-${{ inputs.osName }}
        path: artifacts/binlog
    
    - name: store unit test coverage
      if: inputs.isPrimaryBuildOs == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: unittestcoverage
        path: artifacts/unittestcoverage
        if-no-files-found: error
    
    - name: store integration test coverage
      if: inputs.isPrimaryBuildOs == 'true' && inputs.runIntTests == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: inttestcoverage
        path: artifacts/inttestcoverage
    
    - name: store nuget packages
      if: inputs.isPrimaryBuildOs == 'true' && inputs.produceNugetPackages == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: nuget
        path: artifacts/nuget
        if-no-files-found: error
    
    - name: store omd
      if: inputs.isPrimaryBuildOs == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: omd
        path: artifacts/omd
    
    - name: store sbom
      if: inputs.isPrimaryBuildOs == 'true' && inputs.produceNugetPackages == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: sbom
        path: artifacts/sbom
    
    - name: store outdated
      if: inputs.isPrimaryBuildOs == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: outdated
        path: artifacts/outdated

    - name: store docfx
      if: inputs.isPrimaryBuildOs == 'true' && inputs.apiDocumentation == 'DocFx'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: docfx
        path: artifacts/docfx
