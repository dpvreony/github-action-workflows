name: dotnet-build

on:
  workflow_call:
    inputs:
      solutionName:
        required: true
        type: string
      useSlnx:
        required: false
        type: boolean
        default: false
        description: 'If true, uses .slnx solution format instead of .sln'
      primary-build-mode:
        required: false
        type: string
        default: 'linux-only'
        description: 'Primary build mode. Valid values: "linux-only", "linux-and-windows", "windows-only". Default: "linux-only"'
      requiresMacOS:
        required: false
        type: boolean
        default: false
        description: 'If true, also builds and tests on macOS (never releases from macOS)'
      integration-test-os:
        required: false
        type: string
        default: 'both'
        description: 'Controls which OS runs integration tests when primary-build-mode is "linux-and-windows". Valid values: "both", "linux", "windows". Ignored when primary-build-mode is "linux-only" or "windows-only". Default: "both"'
      workloads:
        required: false
        type: string
        default: ''
        description: 'Comma-separated list of .NET workloads to install'
      apiDocumentation:
        required: false
        type: string
        default: 'DocFx'
        description: 'API Documentation generation tool. Set to "DocFx" to enable DocFX metadata generation, or any other value to disable it.'
    secrets:
      SONAR_TOKEN:
        required: false
      SONAR_PROJECT_KEY:
        required: false
      SONAR_ORGANISATION_KEY:
        required: false
      VIRUSTOTAL_API_KEY:
        required: false
      CODECOV_TOKEN:
        required: false
      SYNCFUSION_LICENSE_KEY:
        required: false
    outputs:
      nbgv:
        description: 'NBGV SemVer2 version'
        value: ${{ jobs.build-linux.outputs.nbgv || jobs.build-windows.outputs.nbgv }}
      change_commit_log:
        description: 'Change commit log'
        value: ${{ jobs.build-linux.outputs.change_commit_log || jobs.build-windows.outputs.change_commit_log }}

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate primary-build-mode input
        run: |
          if [[ "${{ inputs['primary-build-mode'] }}" != "linux-only" && "${{ inputs['primary-build-mode'] }}" != "linux-and-windows" && "${{ inputs['primary-build-mode'] }}" != "windows-only" ]]; then
            echo "::error::Invalid primary-build-mode value '${{ inputs['primary-build-mode'] }}'. Valid values are 'linux-only', 'linux-and-windows', or 'windows-only'."
            exit 1
          fi
      - name: Validate integration-test-os input
        run: |
          if [[ "${{ inputs['integration-test-os'] }}" != "both" && "${{ inputs['integration-test-os'] }}" != "linux" && "${{ inputs['integration-test-os'] }}" != "windows" ]]; then
            echo "::error::Invalid integration-test-os value '${{ inputs['integration-test-os'] }}'. Valid values are 'both', 'linux', or 'windows'."
            exit 1
          fi

  build-linux:
    needs: validate-inputs
    if: inputs['primary-build-mode'] == 'linux-only' || inputs['primary-build-mode'] == 'linux-and-windows'
    uses: ./.github/workflows/_wfc_dotnet-ci-build-linux.yml
    with:
      solutionName: ${{ inputs.solutionName }}
      useSlnx: ${{ inputs.useSlnx }}
      isPrimaryBuildOs: true
      runIntTests: ${{ inputs['primary-build-mode'] == 'linux-only' || inputs['integration-test-os'] == 'both' || inputs['integration-test-os'] == 'linux' }}
      workloads: ${{ inputs.workloads }}
      apiDocumentation: ${{ inputs.apiDocumentation }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANISATION_KEY: ${{ secrets.SONAR_ORGANISATION_KEY }}
      VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SYNCFUSION_LICENSE_KEY: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

  build-windows:
    needs: validate-inputs
    if: inputs['primary-build-mode'] == 'windows-only' || inputs['primary-build-mode'] == 'linux-and-windows'
    uses: ./.github/workflows/_wfc_dotnet-ci-build-windows.yml
    with:
      solutionName: ${{ inputs.solutionName }}
      useSlnx: ${{ inputs.useSlnx }}
      isPrimaryBuildOs: ${{ inputs['primary-build-mode'] == 'windows-only' }}
      runIntTests: ${{ inputs['primary-build-mode'] == 'windows-only' || inputs['integration-test-os'] == 'both' || inputs['integration-test-os'] == 'windows' }}
      workloads: ${{ inputs.workloads }}
      apiDocumentation: ${{ inputs.apiDocumentation }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANISATION_KEY: ${{ secrets.SONAR_ORGANISATION_KEY }}
      VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SYNCFUSION_LICENSE_KEY: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

  build-macos:
    needs: validate-inputs
    if: inputs.requiresMacOS
    uses: ./.github/workflows/_wfc_dotnet-ci-build-macos.yml
    with:
      solutionName: ${{ inputs.solutionName }}
      useSlnx: ${{ inputs.useSlnx }}
      runIntTests: true
      workloads: ${{ inputs.workloads }}
      apiDocumentation: ${{ inputs.apiDocumentation }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SYNCFUSION_LICENSE_KEY: ${{ secrets.SYNCFUSION_LICENSE_KEY }}
