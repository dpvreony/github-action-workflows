# name is made short because the check path becomes really long and repeditive
name: run

on:
  workflow_call:
    inputs:
      solutionName:
        required: true
        type: string
      useSlnx:
        required: false
        type: boolean
        default: false
        description: 'If true, uses .slnx solution format instead of .sln'

jobs:
  snitch-run:
    runs-on: windows-2025
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: true
      DOTNET_GENERATE_ASPNET_CERTIFICATE: false
      solutionpath: ${{ inputs.solutionName }}.${{ inputs.useSlnx && 'slnx' || 'sln' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        path: a
        persist-credentials: false

    - name: Checkout dpvreony/github-action-workflow
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: dpvreony/github-action-workflows
        path: github-action-workflows
        persist-credentials: false

    - name: Install .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        global-json-file: "github-action-workflows/eng/snitch/global.json"

    - name: Install dotnet tools
      run: dotnet tool restore --tool-manifest dotnet-tools.json
      working-directory:
        github-action-workflows/eng/snitch

    - name: Prepare Artifact Directory
      run: |
        mkdir -p artifacts/snitch

    - name: run snitch
      shell: pwsh
      run: |
        dotnet snitch "${{ github.workspace }}/a/src/$env:solutionpath" | Tee-Object -FilePath "${{ github.workspace }}/artifacts/snitch/snitch.txt"
      working-directory:
        github-action-workflows/eng/snitch

    - name: store snitch
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: snitch
        path: artifacts/snitch
