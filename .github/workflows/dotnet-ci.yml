name: Common .NET setup and build workflow

on:
  workflow_call:
    inputs:
      solutionName:
        required: true
        type: string
        description: 'Name of the solution file WITHOUT the extension. On top of running the build. It is ued to calculate the format of the unit tests, benchmarks and integration tests.'
      useSlnx:
        required: false
        type: boolean
        default: false
        description: 'If true, uses .slnx solution format instead of .sln'
      primary-build-mode:
        required: false
        type: string
        default: 'linux-only'
        description: 'Primary build mode. Valid values: "linux-only", "linux-primary-and-windows-secondary", "linux-secondary-and-windows-primary", "windows-only". Default: "linux-only"'
      requiresMacOS:
        required: false
        type: boolean
        default: false
        description: 'If true, also builds and tests on macOS (never releases from macOS)'
      integration-test-os:
        required: false
        type: string
        default: 'both'
        description: 'Controls which OS runs integration tests when primary-build-mode is "linux-primary-and-windows-secondary" or "linux-secondary-and-windows-primary". Valid values: "both", "linux", "windows". Ignored when primary-build-mode is "linux-only" or "windows-only". Default: "both"'
      workloads:
        required: false
        type: string
        default: ''
        description: 'Comma-separated list of .NET workloads to install (e.g., "android,aspire,maui"). Leave empty for no workload installation.'
      publish-targets:
        required: false
        type: string
        default: 'nuget'
        description: 'Comma-separated list of publish targets. Valid values: "nuget" (publish NuGet packages and create a GitHub release), "actions" (create GitHub release only, no NuGet required), "publish" (dotnet publish - reserved for future use). Default: "nuget"'
      apiDocumentation:
        required: false
        type: string
        default: 'DocFx'
        description: 'API Documentation generation tool. Set to "DocFx" to enable DocFX metadata generation, or any other value to disable it.'
    secrets:
      NUGET_API_KEY:
        required: false
        description: 'NuGet.org API key for fallback package publishing.'
      NUGET_USER:
        required: false
        description: 'NuGet.org username (profile name) for Trusted Publishers (OIDC). Set this secret to enable NuGet package publishing. Use your profile name, NOT your email address.'
      SONAR_TOKEN:
        required: false
      SONAR_PROJECT_KEY:
        required: false
      SONAR_ORGANISATION_KEY:
        required: false
      VIRUSTOTAL_API_KEY:
        required: false
      CODECOV_TOKEN:
        required: false
      SYNCFUSION_LICENSE_KEY:
        required: false

jobs:
  build:
    needs: [check-nuget-user-populated, check-nuget-api-key-populated, check-nuget-trusted-publisher-valid, check-publish-targets]
    if: always() && !cancelled()
    permissions:
      contents: read
    uses: ./.github/workflows/_wfc_dotnet-ci-build.yml
    with:
      solutionName: ${{ inputs.solutionName }}
      useSlnx: ${{ inputs.useSlnx }}
      primary-build-mode: ${{ inputs['primary-build-mode'] }}
      requiresMacOS: ${{ inputs.requiresMacOS }}
      integration-test-os: ${{ inputs['integration-test-os'] }}
      workloads: ${{ inputs.workloads }}
      apiDocumentation: ${{ inputs.apiDocumentation }}
      produceNugetPackages: ${{ needs.check-publish-targets.outputs.has_nuget == 'true' && ((needs.check-nuget-user-populated.outputs.has_nuget_user == 'true' && needs.check-nuget-trusted-publisher-valid.result == 'success') || needs.check-nuget-api-key-populated.outputs.has_api_key == 'true') }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANISATION_KEY: ${{ secrets.SONAR_ORGANISATION_KEY }}
      VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SYNCFUSION_LICENSE_KEY: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

  licenses:
    uses: ./.github/workflows/_wfc_dotnet-ci-licenses.yml
    with:
      solutionName: ${{ inputs.solutionName }}
      useSlnx: ${{ inputs.useSlnx }}
      workloads: ${{ inputs.workloads }}

  snitch:
    uses: ./.github/workflows/_wfc_dotnet-ci-snitch.yml
    with:
      solutionName: ${{ inputs.solutionName }}
      useSlnx: ${{ inputs.useSlnx }}

  osv-scan:
    needs: check-codeql-enabled
    if: needs.check-codeql-enabled.outputs.codeql_enabled == 'true'
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.3"
    permissions:
      actions: read
      contents: read
      security-events: write

  appinspector:
    uses: ./.github/workflows/_wfc_dotnet-ci-appinspector.yml
    with:
      solutionName: ${{ inputs.solutionName }}

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always

  validate-renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dpvreony/github-action-renovate-config-validator@63c5f53df823879a6cd46a10d27fbe1d4ede7839

  omd-generation:
    uses: ./.github/workflows/_wfc_dotnet-ci-omd-generation.yml
    with:
      solutionName: ${{ inputs.solutionName }}

  vulnerable-nuget-packages:
    uses: ./.github/workflows/_wfc_dotnet-ci-vulnerable-nuget-packages.yml
    with:
      solutionName: ${{ inputs.solutionName }}
      useSlnx: ${{ inputs.useSlnx }}
      workloads: ${{ inputs.workloads }}

  deprecated-nuget-packages:
    uses: ./.github/workflows/_wfc_dotnet-ci-deprecated-nuget-packages.yml
    with:
      solutionName: ${{ inputs.solutionName }}
      useSlnx: ${{ inputs.useSlnx }}
      workloads: ${{ inputs.workloads }}

  check-codeql-enabled:
    uses: ./.github/workflows/_wfc_dotnet-ci-check-codeql-enabled.yml

  codeql:
    needs: check-codeql-enabled
    if: needs.check-codeql-enabled.outputs.codeql_enabled == 'true'
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    uses: ./.github/workflows/_wfc_dotnet-ci-codeql.yml
    with:
      solutionName: ${{ inputs.solutionName }}

  check-nuget-user-populated:
    runs-on: ubuntu-latest
    outputs:
      has_nuget_user: ${{ steps.check.outputs.has_nuget_user }}
    env:
      NUGET_USER: ${{ secrets.NUGET_USER }}
    steps:
      - name: Check if NUGET_USER is set
        id: check
        run: |
          # Check if we have NUGET_USER configured
          if [ -n "$NUGET_USER" ]; then
            echo "::notice::NUGET_USER is configured. NuGet publishing enabled."
            echo "has_nuget_user=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::NUGET_USER not configured."
            echo "has_nuget_user=false" >> "$GITHUB_OUTPUT"
          fi

  check-nuget-api-key-populated:
    runs-on: ubuntu-latest
    outputs:
      has_api_key: ${{ steps.check.outputs.has_api_key }}
    env:
      NUGET_API_KEY: ${{ secrets.nuget_api_key }}
    steps:
      - name: Check if NUGET_API_KEY is set
        id: check
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            echo "::notice::NUGET_API_KEY is configured. NuGet publishing enabled."
            echo "has_api_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::NUGET_API_KEY not configured."
            echo "has_api_key=false" >> "$GITHUB_OUTPUT"
          fi
          
  check-nuget-trusted-publisher-valid:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs:
      check-nuget-user-populated
    if: needs.check-nuget-user-populated.outputs.has_nuget_user == 'true'
    steps:
      - name: Validate NuGet Trusted Publisher login
        uses: NuGet/login@v1
        id: nuget-login-test
        with:
          user: ${{ secrets.NUGET_USER }}
      
      - name: Confirm Trusted Publisher is valid
        run: |
          if [ -n "${{ steps.nuget-login-test.outputs.NUGET_API_KEY }}" ]; then
            echo "::notice::Successfully validated NuGet Trusted Publisher. Temporary API key obtained."
          else
            echo "::error::Failed to obtain temporary API key from NuGet Trusted Publisher."
            exit 1
          fi
     
  check-nuget-environment:
    permissions:
      actions: read
      contents: read
      deployments: read
    runs-on: ubuntu-latest
    needs:
      - check-nuget-user-populated
      - check-nuget-api-key-populated
      - check-nuget-trusted-publisher-valid
      - check-publish-targets
    if: |
      always() &&
      !cancelled() &&
      !failure() &&
      needs.check-publish-targets.outputs.has_nuget == 'true' &&
      (needs.check-nuget-user-populated.outputs.has_nuget_user == 'true' || needs.check-nuget-api-key-populated.outputs.has_api_key == 'true')
    steps:
      - name: Check if 'nuget' environment exists and has protection rules
        uses: dpvreony/ensure-environment-protected@1.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          environment_name: 'nuget'

  check-publish-targets:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      has_nuget: ${{ steps.check.outputs.has_nuget }}
      has_actions: ${{ steps.check.outputs.has_actions }}
      has_publish: ${{ steps.check.outputs.has_publish }}
    steps:
      - name: Check publish targets
        id: check
        env:
          PUBLISH_TARGETS: ${{ inputs.publish-targets }}
        run: |
          has_nuget=false
          has_actions=false
          has_publish=false
          IFS=',' read -ra targets <<< "$PUBLISH_TARGETS"
          for target in "${targets[@]}"; do
            trimmed=$(echo "$target" | tr -d ' ')
            case "$trimmed" in
              nuget) has_nuget=true ;;
              actions) has_actions=true ;;
              publish) has_publish=true ;;
            esac
          done
          echo "has_nuget=$has_nuget" >> "$GITHUB_OUTPUT"
          echo "has_actions=$has_actions" >> "$GITHUB_OUTPUT"
          echo "has_publish=$has_publish" >> "$GITHUB_OUTPUT"
          echo "::notice::Publish targets - nuget: $has_nuget, actions: $has_actions, publish: $has_publish"

  check-release-required:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      release_required: ${{ steps.check.outputs.release_required }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Check if release is required
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Try to get the latest release
          latest_release=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          
          if [ -z "$latest_release" ]; then
            echo "No existing release found, release is required"
            echo "release_required=true" >> "$GITHUB_OUTPUT"
          else
            echo "Latest release: $latest_release"
            
            # Check if this build is older than the latest release
            # Get commit SHA for the latest release
            latest_sha=$(git rev-list -n 1 "$latest_release" 2>/dev/null || echo "")
            current_sha="${{ github.sha }}"
            
            if [ -n "$latest_sha" ]; then
              # Check if current commit is an ancestor of latest release
              # If current is an ancestor of latest, then latest is newer and we should not release
              if git merge-base --is-ancestor "$current_sha" "$latest_sha" 2>/dev/null; then
                echo "::warning::Current commit is older than the latest release ($latest_release). This build will not trigger a release."
                echo "release_required=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            
            # Get diff between current commit and latest release tag
            # Check if there are changes in src/ excluding *.*Tests folders
            changed_files=$(git diff --name-only "$latest_release" HEAD -- src/ \
              | grep -v '.*\..*Tests/' \
              | grep -v '.*\..*Benchmarks/' \
              | grep -v '.*\..*Testing/' || true)
            
            if [ -n "$changed_files" ]; then
              echo "Changes detected in non-test files:"
              echo "$changed_files"
              echo "release_required=true" >> "$GITHUB_OUTPUT"
            else
              echo "No changes in non-test files, release not required"
              echo "release_required=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  debug-release-values:
    runs-on: ubuntu-latest
    needs: [build, check-nuget-environment, check-release-required, check-publish-targets]
    if: always()
    permissions:
      contents: read
    outputs:
      run_release: ${{ steps.evaluate-release-condition.outputs.run_release }}
      run_release_actions: ${{ steps.evaluate-release-condition.outputs.run_release_actions }}
    steps:
      - name: Display Release Decision Variables
        env:
          EXPECTED_REF: refs/heads/main
          CURRENT_REF: ${{ github.ref }}
          CURRENT_SHA: ${{ github.sha }}
          BRANCH_MATCHES_MAIN: ${{ 'refs/heads/main' == github.ref }}
          RELEASE_REQUIRED: ${{ needs.check-release-required.outputs.release_required }}
          CHANGE_COMMIT_LOG: ${{ needs.build.outputs.change_commit_log }}
          BUILD_RESULT: ${{ needs.build.result }}
          NBGV_VERSION: ${{ needs.build.outputs.nbgv }}
          NUGET_ENV_RESULT: ${{ needs.check-nuget-environment.result }}
          HAS_NUGET: ${{ needs.check-publish-targets.outputs.has_nuget }}
          HAS_ACTIONS: ${{ needs.check-publish-targets.outputs.has_actions }}
          HAS_PUBLISH: ${{ needs.check-publish-targets.outputs.has_publish }}
        shell: pwsh
        run: |
          Write-Host "=== Release Decision Troubleshooting ==="
          Write-Host ""
          Write-Host "## Branch and Commit Information"
          Write-Host "github.ref: $env:CURRENT_REF"
          Write-Host "github.sha: $env:CURRENT_SHA"
          Write-Host "Expected ref for release: $env:EXPECTED_REF"
          Write-Host "Branch matches main (using release job's condition order): $env:BRANCH_MATCHES_MAIN"
          Write-Host ""
          Write-Host "## Release Required Check"
          Write-Host "release_required: $env:RELEASE_REQUIRED"
          Write-Host ""
          Write-Host "## Build Outputs"
          Write-Host "build job result: $env:BUILD_RESULT"
          Write-Host "nbgv version: $env:NBGV_VERSION"
          Write-Host "change_commit_log length: $($env:CHANGE_COMMIT_LOG.Length) characters"
          Write-Host ""
          Write-Host "## Publish Targets"
          Write-Host "has_nuget: $env:HAS_NUGET"
          Write-Host "has_actions: $env:HAS_ACTIONS"
          Write-Host "has_publish: $env:HAS_PUBLISH"
          Write-Host ""
          Write-Host "## NuGet Environment Check"
          Write-Host "check-nuget-environment job result: $env:NUGET_ENV_RESULT"
          Write-Host ""
          Write-Host "## Release Job Condition Evaluation"
          $baseCondition = $env:EXPECTED_REF -eq $env:CURRENT_REF -and $env:RELEASE_REQUIRED -eq 'true' -and $env:BUILD_RESULT -eq 'success'
          $runRelease = $baseCondition -and $env:NUGET_ENV_RESULT -eq 'success' -and $env:HAS_NUGET -eq 'true'
          $runReleaseActions = $baseCondition -and $env:HAS_ACTIONS -eq 'true' -and $env:HAS_NUGET -ne 'true'
          Write-Host "NuGet release condition (main branch AND release required AND build succeeded AND NuGet environment configured AND nuget in publish-targets):"
          if ($runRelease) {
            Write-Host "✅ WILL RUN: NuGet release job will execute"
          } else {
            Write-Host "❌ WILL SKIP: NuGet release job will be skipped"
            Write-Host ""
            Write-Host "Reasons:"
            if ($env:EXPECTED_REF -ne $env:CURRENT_REF) {
              Write-Host "  - Not on main branch (current: $env:CURRENT_REF)"
            }
            if ($env:RELEASE_REQUIRED -ne 'true') {
              Write-Host "  - Release not required (release_required: $env:RELEASE_REQUIRED)"
            }
            if ($env:BUILD_RESULT -ne 'success') {
              Write-Host "  - Build did not succeed (build result: $env:BUILD_RESULT)"
            }
            if ($env:NUGET_ENV_RESULT -ne 'success') {
              Write-Host "  - NuGet environment not configured or check failed (check-nuget-environment result: $env:NUGET_ENV_RESULT)"
            }
            if ($env:HAS_NUGET -ne 'true') {
              Write-Host "  - 'nuget' not in publish-targets"
            }
          }
          Write-Host ""
          Write-Host "Actions-only release condition (main branch AND release required AND build succeeded AND actions in publish-targets AND nuget NOT in publish-targets):"
          if ($runReleaseActions) {
            Write-Host "✅ WILL RUN: Actions-only release job will execute"
          } else {
            Write-Host "❌ WILL SKIP: Actions-only release job will be skipped"
            if ($env:HAS_ACTIONS -ne 'true') {
              Write-Host "  - 'actions' not in publish-targets"
            }
            if ($env:HAS_NUGET -eq 'true') {
              Write-Host "  - 'nuget' is also in publish-targets; the NuGet release job handles the GitHub release"
            }
          }
          Write-Host ""
          Write-Host "=== End of Release Decision Troubleshooting ==="
      
      - name: Set release output
        id: evaluate-release-condition
        env:
          EXPECTED_REF: refs/heads/main
          CURRENT_REF: ${{ github.ref }}
          RELEASE_REQUIRED: ${{ needs.check-release-required.outputs.release_required }}
          BUILD_RESULT: ${{ needs.build.result }}
          NUGET_ENV_RESULT: ${{ needs.check-nuget-environment.result }}
          HAS_NUGET: ${{ needs.check-publish-targets.outputs.has_nuget }}
          HAS_ACTIONS: ${{ needs.check-publish-targets.outputs.has_actions }}
        shell: pwsh
        run: |
          $baseCondition = $env:EXPECTED_REF -eq $env:CURRENT_REF -and $env:RELEASE_REQUIRED -eq 'true' -and $env:BUILD_RESULT -eq 'success'
          $runRelease = $baseCondition -and $env:NUGET_ENV_RESULT -eq 'success' -and $env:HAS_NUGET -eq 'true'
          $runReleaseActions = $baseCondition -and $env:HAS_ACTIONS -eq 'true' -and $env:HAS_NUGET -ne 'true'
          Add-Content -Path $env:GITHUB_OUTPUT -Value "run_release=$($runRelease.ToString().ToLower())"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "run_release_actions=$($runReleaseActions.ToString().ToLower())"
          if ($runRelease) {
            Write-Host "::notice::NuGet release will run"
          } elseif ($runReleaseActions) {
            Write-Host "::notice::Actions-only release will run"
          } else {
            Write-Host "::notice::Release will be skipped"
          }

  release:
    if: always() && needs.debug-release-values.outputs.run_release == 'true'
    permissions:
      contents: write
      pages: write
      id-token: write
      actions: write
    runs-on: ubuntu-latest
    needs: [build, check-nuget-environment, check-release-required, debug-release-values, check-nuget-user-populated, check-nuget-api-key-populated]
    environment:
      name: nuget
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: true
      DOTNET_GENERATE_ASPNET_CERTIFICATE: false
    steps:
    - name: Cancel old pending releases
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Get the current version and SHA
        CURRENT_VERSION="${{ needs.build.outputs.nbgv }}"
        CURRENT_SHA="${{ github.sha }}"
        CURRENT_RUN_ID="${{ github.run_id }}"
        
        echo "Current release: $CURRENT_VERSION (SHA: $CURRENT_SHA, Run ID: $CURRENT_RUN_ID)"
        
        # Get all workflow runs that are waiting for approval on the nuget environment
        # Filter for runs on the default branch that are in 'waiting' status
        pending_runs=$(gh api \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "/repos/${{ github.repository }}/actions/runs?status=waiting&branch=${{ github.event.repository.default_branch }}" \
          --jq '.workflow_runs[] | select(.id != '$CURRENT_RUN_ID') | .id')
        
        if [ -z "$pending_runs" ]; then
          echo "No pending workflow runs found to cancel"
          exit 0
        fi
        
        echo "Found pending workflow runs to check: $pending_runs"
        
        # For each pending run, check if it has pending deployments for the nuget environment
        for run_id in $pending_runs; do
          echo "Checking run $run_id for pending deployments..."
          
          # Get pending deployments for this run
          pending_deployments=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/actions/runs/$run_id/pending_deployments" \
            --jq '.[] | select(.environment.name == "nuget") | .environment.id' 2>/dev/null || echo "")
          
          if [ -n "$pending_deployments" ]; then
            echo "Found pending deployment for nuget environment in run $run_id"
            
            # Reject the pending deployment
            for env_id in $pending_deployments; do
              echo "Rejecting deployment for environment $env_id in run $run_id"
              
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${{ github.repository }}/actions/runs/$run_id/pending_deployments" \
                -f "environment_ids[]=$env_id" \
                -f "state=rejected" \
                -f "comment=Superseded by release $CURRENT_VERSION (SHA: $CURRENT_SHA) from run $CURRENT_RUN_ID" \
                && echo "Successfully rejected deployment in run $run_id" \
                || echo "Failed to reject deployment in run $run_id"
            done
          else
            echo "No pending nuget deployment found for run $run_id"
          fi
        done
        
        echo "Finished canceling old pending releases"
    
    - name: Download NuGet Packages
      uses: actions/download-artifact@v8
      with:
        name: nuget
        path: ${{ github.workspace }}/nuget
    
    - name: Download DocFX Artifact
      if: inputs.apiDocumentation == 'DocFx'
      uses: actions/download-artifact@v8
      with:
        name: docfx
        path: ${{ github.workspace }}/docfx
    
    - name: Create docfx-metadata.zip
      if: inputs.apiDocumentation == 'DocFx'
      shell: pwsh
      run: |
        $docfxPath = "${{ github.workspace }}/docfx"
        $zipPath = "${{ github.workspace }}/docfx-metadata.zip"
        
        if (Test-Path $docfxPath) {
          Compress-Archive -Path "$docfxPath/*" -DestinationPath $zipPath -CompressionLevel Optimal
          Write-Output "::notice::Created docfx-metadata.zip with contents from docfx artifact"
        } else {
          Write-Output "::warning::DocFX artifact path not found, skipping zip creation"
        }
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
          tag_name: ${{ needs.build.outputs.nbgv }}
          release_name: ${{ needs.build.outputs.nbgv }}
          body: |
            ${{ needs.build.outputs.change_commit_log }}
          draft: true
    
    - name: Upload DocFX Metadata to Release
      if: inputs.apiDocumentation == 'DocFx'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ github.workspace }}/docfx-metadata.zip
        asset_name: docfx-metadata.zip
        asset_content_type: application/zip

    - name: Publish Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        # Publish the draft release
        if gh release edit "${{ needs.build.outputs.nbgv }}" --repo "${{ github.repository }}" --draft=false; then
          echo "::notice::Successfully published release ${{ needs.build.outputs.nbgv }}"
        else
          echo "::error::Failed to publish release ${{ needs.build.outputs.nbgv }}"
          exit 1
        fi

    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      if: needs.check-nuget-user-populated.outputs.has_nuget_user == 'true'
      id: nuget-login
      with:
        user: ${{ secrets.NUGET_USER }}
    
    - name: NuGet Push (Trusted Publisher)
      if: needs.check-nuget-user-populated.outputs.has_nuget_user == 'true'
      env:
        NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        SOURCE_URL: https://api.nuget.org/v3/index.json
      working-directory: nuget
      run: |
        echo "::notice::Using Trusted Publishers (OIDC) for NuGet push..."
        for package in *.nupkg; do
          dotnet nuget push -s "$SOURCE_URL" -k "$NUGET_API_KEY" "$package"
        done

    - name: NuGet Push (API_KEY)
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.NUGET_API_KEY }}
        SOURCE_URL: https://api.nuget.org/v3/index.json
      if: needs.check-nuget-api-key-populated.outputs.has_api_key == 'true'
      working-directory: nuget
      run: |
        for package in *.nupkg; do
          dotnet nuget push -s "$SOURCE_URL" -k "$NUGET_AUTH_TOKEN" "$package"
        done

  release-actions:
    if: always() && needs.debug-release-values.outputs.run_release_actions == 'true'
    permissions:
      contents: write
      id-token: write
      actions: write
    runs-on: ubuntu-latest
    needs: [build, check-release-required, debug-release-values]
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: true
      DOTNET_GENERATE_ASPNET_CERTIFICATE: false
    steps:
    - name: Download DocFX Artifact
      if: inputs.apiDocumentation == 'DocFx'
      uses: actions/download-artifact@v8
      with:
        name: docfx
        path: ${{ github.workspace }}/docfx
    
    - name: Create docfx-metadata.zip
      if: inputs.apiDocumentation == 'DocFx'
      shell: pwsh
      run: |
        $docfxPath = "${{ github.workspace }}/docfx"
        $zipPath = "${{ github.workspace }}/docfx-metadata.zip"
        
        if (Test-Path $docfxPath) {
          Compress-Archive -Path "$docfxPath/*" -DestinationPath $zipPath -CompressionLevel Optimal
          Write-Output "::notice::Created docfx-metadata.zip with contents from docfx artifact"
        } else {
          Write-Output "::warning::DocFX artifact path not found, skipping zip creation"
        }
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
          tag_name: ${{ needs.build.outputs.nbgv }}
          release_name: ${{ needs.build.outputs.nbgv }}
          body: |
            ${{ needs.build.outputs.change_commit_log }}
          draft: true
    
    - name: Upload DocFX Metadata to Release
      if: inputs.apiDocumentation == 'DocFx'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ github.workspace }}/docfx-metadata.zip
        asset_name: docfx-metadata.zip
        asset_content_type: application/zip

    - name: Publish Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        # Publish the draft release
        if gh release edit "${{ needs.build.outputs.nbgv }}" --repo "${{ github.repository }}" --draft=false; then
          echo "::notice::Successfully published release ${{ needs.build.outputs.nbgv }}"
        else
          echo "::error::Failed to publish release ${{ needs.build.outputs.nbgv }}"
          exit 1
        fi
