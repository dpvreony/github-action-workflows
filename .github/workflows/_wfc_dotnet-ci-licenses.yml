# name is made short because the check path becomes really long and repeditive
name: run

on:
  workflow_call:
    inputs:
      solutionName:
        required: true
        type: string
      useSlnx:
        required: false
        type: boolean
        default: false
        description: 'If true, uses .slnx solution format instead of .sln'
      workloads:
        required: false
        type: string
        default: ''
        description: 'Comma-separated list of .NET workloads to install'

jobs:
  licenses-run:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: true
      DOTNET_GENERATE_ASPNET_CERTIFICATE: false
      solutionpath: ${{ inputs.solutionName }}.${{ inputs.useSlnx && 'slnx' || 'sln' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        path: a
        persist-credentials: false

    - name: Checkout dpvreony/github-action-workflow
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: dpvreony/github-action-workflows
        path: github-action-workflows
        persist-credentials: false

    - name: Install .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
      with:
        global-json-file: "github-action-workflows/eng/licenses/global.json"

    - name: Install DotNet workloads
      uses: ./github-action-workflows/.github/actions/dotnet-install-workloads
      with:
        workloads: ${{ inputs.workloads }}

    - name: Install dotnet tools
      run: dotnet tool restore --tool-manifest dotnet-tools.json
      working-directory:
        github-action-workflows/eng/licenses

    - name: Prepare Artifact Directory
      run: |
        mkdir -p artifacts/licenses

    - name: Restore Packages
      run: |
        dotnet restore "${solutionpath}" -- /bl:artifacts\\binlog\\restore.binlog
      working-directory: a/src

    - name: List licenses
      run: |
        dotnet nuget-license -i "${{ github.workspace }}/a/src/${solutionpath}" -t -o Json -fo "${{ github.workspace }}/artifacts/licenses/licenses.json"
      working-directory:
        github-action-workflows/eng/licenses

    - name: store licenses
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: licenses
        path: artifacts/licenses
